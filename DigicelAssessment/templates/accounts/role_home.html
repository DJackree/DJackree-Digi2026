<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ heading }} · Telecom Portal</title>
  </head>
  <body>
    <main>
      <h1>{{ heading }}</h1>
      <p>Signed in as <strong>{{ user.username }}</strong>.</p>
      <p>Phase 2 placeholder — Bootstrap UI arrives in Phase 3.</p>
      <form method="post" action="{% url 'accounts:logout' %}">
        {% csrf_token %}
        <button type="submit">Log out</button>
      </form>
    </main>
  </body>
</html>
